version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: ats_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=api
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: ats_scraper
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=scraper
    restart: unless-stopped
